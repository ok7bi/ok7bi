<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>شاشة العرض</title>

<link rel="stylesheet" href="style.css"/>

<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js"></script>

</head>
<body>

<div class="container">

<div class="topbar">
<div class="brand">
<div class="logo">📺</div>

<div>
<h1 class="h1">شاشة العرض</h1>
<div class="p">السؤال والخيارات تظهر للجمهور</div>
</div>

</div>

<span class="badge" id="live">انتظار</span>
</div>

<div class="grid">

<div class="card" style="grid-column: span 12;">
<div class="row" style="justify-content:space-between">

<span class="badge green" id="match">—</span>

<span class="badge" id="qNum">سؤال —</span>

</div>
</div>

<div class="card center" style="grid-column: span 4;">
<div class="small">الوقت المتبقي</div>
<div class="timer" id="timer">—</div>
</div>

<div class="card" style="grid-column: span 8;">

<div class="question" id="qText">
انتظار بدء المباراة…
</div>

<div class="answers" id="answers"></div>

<div class="winnerBox" id="winner">
النتيجة: —
</div>

</div>

<div class="card" style="grid-column: span 6;">
<h2>ترتيب الفرق</h2>
<div id="liveStandings"></div>
</div>

<div class="card" style="grid-column: span 6;">
<h2>🏆 الأوائل من الجمهور</h2>
<div id="audienceTop5" class="audienceMini"></div>
</div>

</div>

<div class="footer">
ليالي رمضان الثقافية
</div>

</div>

<audio id="bell" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6cfa1c0d36.mp3"></audio>

<script>

(function(){

if(!initFirebaseOrShowError()) return;

const PATH="contest_v1";

const teamsRef=ref(PATH+"/teams");
const matchesRef=ref(PATH+"/matches");
const stateRef=ref(PATH+"/state");
const resultsRef=ref(PATH+"/matchResults");
const audienceUsersRef=ref(PATH+"/audience/users");
const subsRef=ref(PATH+"/submissions");

let teams={},matches={},state={};

const bell=document.getElementById("bell");

function playBell(){
try{
bell.currentTime=0;
bell.play();
}catch(e){}
}

function renderAudience(){

audienceUsersRef.on("value",snap=>{

if(!snap.exists()) return;

const users=snap.val();

const sorted=Object.keys(users)
.map(u=>({name:u,score:users[u].score||0}))
.sort((a,b)=>b.score-a.score)
.slice(0,5);

let html="";

sorted.forEach((u,i)=>{

html+=`
<div style="font-size:22px;margin:10px 0;display:flex;justify-content:space-between">
<span>#${i+1} - ${u.name}</span>
<span>${u.score}</span>
</div>
`;

});

document.getElementById("audienceTop5").innerHTML=html;

});

}
function renderTeams(){

const m=matches[state.matchId];
if(!m) return;

const teamA=teams[m.teamA];
const teamB=teams[m.teamB];

let html="";

html+=`<div style="font-size:28px;margin:12px 0;font-weight:bold">
${teamA?.name||m.teamA} — ${teamA?.points||0} نقطة
</div>`;

html+=`<div style="font-size:28px;margin:12px 0;font-weight:bold">
${teamB?.name||m.teamB} — ${teamB?.points||0} نقطة
</div>`;

document.getElementById("liveStandings").innerHTML=html;

}

function renderQuestion(){

const q=state.question;
if(!q) return;
document.getElementById("winner").textContent = "النتيجة: —";
document.getElementById("qText").textContent=q.text||"";

const wrap=document.getElementById("answers");
wrap.innerHTML="";

(q.answers||[]).forEach((a,i)=>{

const b=document.createElement("button");
b.className="answerBtn";
b.textContent=LETTERS[i]+" ) "+a;
wrap.appendChild(b);

});

showCorrect();

}

function showCorrect(){

if(!state.matchId) return;

const qKey=String(state.qIndex);

resultsRef.child(state.matchId).child(qKey)
.once("value")
.then(snap=>{

const r=snap.val();
if(!r) return;

const correct=r.correctIndex;

const btns=document.querySelectorAll(".answerBtn");

btns.forEach(b=>b.classList.remove("correct"));

if(btns[correct]){
btns[correct].classList.add("correct");
}

showWinner(r);

});

}

function showWinner(r){

const m=matches[state.matchId];
if(!m) return;

const teamA=teams[m.teamA];
const teamB=teams[m.teamB];

const aAward=r.teamA?.award||0;
const bAward=r.teamB?.award||0;

let text="";

if(aAward===0 && bAward===0){

text=`النتيجة: <span style="color:red;font-weight:bold">لا يوجد إجابة</span>`;

}else if(aAward===2 && bAward===0){

text=`النتيجة: الأسرع <span style="color:green">(+2)</span> = ${teamA?.name||m.teamA}`;

}else if(bAward===2 && aAward===0){

text=`النتيجة: الأسرع <span style="color:green">(+2)</span> = ${teamB?.name||m.teamB}`;

}else{

let fastest=aAward===2?(teamA?.name||m.teamA):(teamB?.name||m.teamB);
let second=aAward===1?(teamA?.name||m.teamA):(teamB?.name||m.teamB);

text=`النتيجة: الأسرع <span style="color:green">(+2)</span> = ${fastest} • <span style="color:green">(+1)</span> = ${second}`;

}

document.getElementById("winner").innerHTML=text;

}

function renderTimer(){

if(!state.timerEnd){
document.getElementById("timer").textContent="—";
return;
}

const left=Math.max(0,
Math.ceil((state.timerEnd-Date.now())/1000)
);

document.getElementById("timer").textContent=left;

}

function renderMatch(){

const m=matches[state.matchId];
if(!m) return;

const teamA=teams[m.teamA]?.name||m.teamA;
const teamB=teams[m.teamB]?.name||m.teamB;

document.getElementById("match").textContent=
teamA+" ضد "+teamB;

}

function listenBell(){

if(!state.matchId) return;
if(state.qIndex==null) return;

const qKey=String(state.qIndex);

subsRef.child(state.matchId).child(qKey)
.on("child_added",snap=>{

playBell();

});

}

teamsRef.on("value",s=>{
teams=s.val()||{};
renderTeams();
});

matchesRef.on("value",s=>{
matches=s.val()||{};
renderMatch();
});

stateRef.on("value",s=>{

state=s.val()||{};

document.getElementById("qNum").textContent=
state.qIndex>=0?"سؤال "+(state.qIndex+1):"سؤال —";

renderMatch();
renderQuestion();
renderTeams();
renderAudience();
listenBell();

});

setInterval(renderTimer,500);

})();
</script>

<div class="designer-badge">
<a href="https://www.instagram.com/_1c29/" target="_blank">
تصميم وبرمجة: <strong>عَلي بن حيدر🤎</strong></a>
</div>

</body>
</html>

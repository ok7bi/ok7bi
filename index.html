<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة ليالي رمضان الثقافية</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌙 مسابقة ليالي رمضان الثقافية</h1>

<div id="setup">
<h2>إعداد الفرق</h2>
<label>عدد الفرق:</label>
<input type="number" id="teamsCount" value="8">
<button onclick="createTeams()">إنشاء الفرق</button>

<div id="teams"></div>
<button onclick="startTournament()">بدء الدوري</button>
</div>

<div id="match" style="display:none">
<h2 id="teamsTitle"></h2>
<div id="timer">30</div>

<div id="questionBox"></div>

<button onclick="nextQuestion()">السؤال التالي</button>

<h3>النقاط</h3>
<div id="score"></div>
</div>

<script src="script.js"></script>
</body>
</html>

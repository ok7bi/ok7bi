<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة ليالي رمضان الثقافية</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="admin">
<h1>🌙 مسابقة ليالي رمضان الثقافية</h1>

<h2>إعداد البطولة</h2>
<label>عدد الفرق:</label>
<input id="teamsCount" type="number" value="8">
<button onclick="createTeams()">إنشاء</button>

<div id="teams"></div>

<button class="start" onclick="start()">بدء البطولة</button>
</div>

<div id="game" style="display:none">
<h2 id="matchTitle"></h2>

<div class="timer" id="timer">30</div>

<div id="question"></div>

<div id="answers"></div>

<div class="buzzers">
<button onclick="buzz(0)">فريق 1 ضغط</button>
<button onclick="buzz(1)">فريق 2 ضغط</button>
</div>

<button onclick="next()">السؤال التالي</button>

<h3>النقاط</h3>
<div id="score"></div>
</div>

<audio id="bell">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script src="script.js"></script>
</body>
</html>

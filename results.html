<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>سجل النتائج (V5)</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">
      <div class="logo">🧾</div>
      <div>
        <h1 class="h1">سجل النتائج (V5)</h1>
        <div class="p">يعرض كل المباريات + نتيجة كل سؤال + نقاط المباراة.</div>
      </div>
    </div>
    <a class="btn ghost" href="index.html">الرئيسية</a>
  </div>

  <div class="card" data-fb-error style="display:none">
    <h2>⚠️ Firebase غير مضبوط</h2>
    <p class="bigNote">المشرف لازم يضبط <span class="kbd">firebase-config.js</span> ويرفع الملفات.</p>
  </div>

  <div class="grid">
    <div class="card" style="grid-column: span 12;">
      <h2>المباريات</h2>
      <div id="list"></div>
    </div>
  </div>

  <div class="footer">سجل النتائج — ليالي رمضان الثقافية</div>
</div>

<script>
(function(){
  if(!initFirebaseOrShowError()) return;

  const PATH="contest_v1";
  const teamsRef=ref(PATH+"/teams");
  const matchesRef=ref(PATH+"/matches");
  const resultsRef=ref(PATH+"/matchResults");
  const matchQsRef=ref(PATH+"/matchQuestions");

  let teams={}, matches={}, results={}, matchQs={};
  function teamName(id){ return teams[id]?.name || id; }

  function render(){
    const wrap=el("list");
    const ms = Object.values(matches||{})
      .sort((a,b)=>{
        const ra = (a.round==="final"?3:(a.round==="semi"?2:(a.round==="groups"?1:0)));
        const rb = (b.round==="final"?3:(b.round==="semi"?2:(b.round==="groups"?1:0)));
        if(ra!==rb) return ra-rb;
        return (a.group||"").localeCompare(b.group||"");
      });

    if(ms.length===0){ wrap.innerHTML="<div class='bigNote'>لا توجد مباريات.</div>"; return; }

    let html="";
    ms.forEach(m=>{
      const r = results[m.id] || {};
      const scoreA = m.scoreA||0, scoreB = m.scoreB||0;
      const title = `${teamName(m.teamA)} ضد ${teamName(m.teamB)} • ${m.round==="groups"?"المجموعات":(m.round==="semi"?"نصف النهائي":"النهائي")} ${m.group?("("+m.group+")"):""}`;
      html += `<div class="card" style="margin-bottom:12px">
        <div class="row" style="justify-content:space-between">
          <div><b>${title}</b></div>
          <span class="badge green">${scoreA} - ${scoreB}</span>
        </div>
        <div class="small">حالة: ${m.played?"تمت":"لم تتم"}</div>
        <div style="margin-top:10px">`;

      for(let qi=0; qi<MATCH_Q_COUNT; qi++){
        const qKey=String(qi);
        const qRes = r[qKey];
        const qObj = (matchQs[m.id] && matchQs[m.id][qKey]) ? matchQs[m.id][qKey] : null;
        const qText = qObj?.text ? qObj.text : (qRes?.qText || `سؤال ${qi+1}`);
        if(!qRes){
          html += `<div class="small">س${qi+1}: ${qText} — <span class="badge">لا نتيجة</span></div>`;
          continue;
        }
        const a = qRes.teamA || {};
        const b = qRes.teamB || {};
        const ca = a.correct ? "✅" : (a.answered ? "❌" : "—");
        const cb = b.correct ? "✅" : (b.answered ? "❌" : "—");
        html += `<div class="small">
          س${qi+1}: ${qText}<br>
          ${teamName(m.teamA)}: ${a.answered?LETTERS[a.answerIndex]:"—"} ${ca} (+${a.award||0}) • 
          ${teamName(m.teamB)}: ${b.answered?LETTERS[b.answerIndex]:"—"} ${cb} (+${b.award||0})
        </div>`;
      }

      html += `</div></div>`;
    });
    wrap.innerHTML=html;
  }

  teamsRef.on("value", s=>{teams=s.val()||{}; render();});
  matchesRef.on("value", s=>{matches=s.val()||{}; render();});
  resultsRef.on("value", s=>{results=s.val()||{}; render();});
  matchQsRef.on("value", s=>{matchQs=s.val()||{}; render();});
})();
</script>
</body>
</html>

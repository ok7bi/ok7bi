<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><title>لوحة المشرف</title>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script></head>
<body style="font-family:Arial;background:#111;color:white;text-align:center;padding:40px">
<h1>لوحة المشرف V5</h1>
<button onclick="init()">تهيئة البطولة</button>
<script>
function init(){
 if(!window.FIREBASE_CONFIG.apiKey){alert("ضع إعدادات Firebase أولاً");return;}
 firebase.initializeApp(window.FIREBASE_CONFIG);
 firebase.database().ref("contest_v1/teams").set({
  T1:{name:"فريق الهدى",code:"1111",points:0},
  T2:{name:"فريق النور",code:"2222",points:0},
  T3:{name:"فريق الفرقان",code:"3333",points:0},
  T4:{name:"فريق الإيمان",code:"4444",points:0},
  T5:{name:"فريق التقوى",code:"5555",points:0},
  T6:{name:"فريق الصالحين",code:"6666",points:0},
  T7:{name:"فريق اليقين",code:"7777",points:0},
  T8:{name:"فريق البيان",code:"8888",points:0}
 });
 alert("تم إنشاء الفرق بنجاح");
}
</script></body></html>
